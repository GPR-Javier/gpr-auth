server:
  port: 8081
  servlet:
    context-path: /api/auth

spring:
  application:
    name: wos-auth
  datasource:
    url: jdbc:postgresql://localhost:5432/workos
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: 9X2vK8mP4qR7sT1uW6yA3dF0gH5jL8nB2eC7fI4kM1pQ6rS0tU9vX3zA5bE8hJnK2mP5qR7sT0uW3yA6dF1gH4jL9nB3eC8fI5kM2p
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

logging:
  level:
    org.springframework.security: DEBUG
    com.gpm: DEBUG
